name: Refresh bracket reference data

on:
  schedule:
    # Mondays 04:17 UTC — off the hour so we are not in the thundering herd.
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Game Changers and combo index
        run: python3 scripts/refresh_reference.py

      - name: Commit if anything changed
        run: |
          if git diff --quiet -- data/; then
            echo "reference data unchanged"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: refresh bracket reference data"
          git push
